name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller flask werkzeug pynput

      - name: Build macOS app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --onedir \
            --name ProToolsTrackNamer_macOS \
            --hidden-import openpyxl \
            --hidden-import pynput \
            --hidden-import flask \
            --hidden-import werkzeug \
            --add-data "templates:templates" \
            protools_tracknamer_standalone.py

      - name: Package macOS app
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent dist/ProToolsTrackNamer_macOS.app release/ProToolsTrackNamer_macOS-arm64.zip
          mkdir -p /tmp/ProToolsTrackNamer_macOS_dmg
          cp -R dist/ProToolsTrackNamer_macOS.app /tmp/ProToolsTrackNamer_macOS_dmg/
          hdiutil create -volname "ProToolsTrackNamer_macOS" \
            -srcfolder /tmp/ProToolsTrackNamer_macOS_dmg \
            -ov -format UDZO release/ProToolsTrackNamer_macOS-arm64.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ProToolsTrackNamer-macOS
          path: |
            release/ProToolsTrackNamer_macOS-arm64.zip
            release/ProToolsTrackNamer_macOS-arm64.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller flask werkzeug pynput

      - name: Build Windows exe
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --console \
            --name ProToolsTrackNamer_Windows_EXE \
            --hidden-import openpyxl \
            --hidden-import pynput \
            --hidden-import flask \
            --hidden-import werkzeug \
            --add-data "templates;templates" \
            protools_tracknamer_standalone.py

      - name: Package Windows exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/ProToolsTrackNamer_Windows_EXE.exe release/
          Compress-Archive -Path release/ProToolsTrackNamer_Windows_EXE.exe -DestinationPath release/ProToolsTrackNamer_Windows_EXE.zip -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ProToolsTrackNamer-Windows
          path: |
            release/ProToolsTrackNamer_Windows_EXE.exe
            release/ProToolsTrackNamer_Windows_EXE.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ProToolsTrackNamer-macOS
          path: release

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: ProToolsTrackNamer-Windows
          path: release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ProToolsTrackNamer_macOS-arm64.zip
            release/ProToolsTrackNamer_macOS-arm64.dmg
            release/ProToolsTrackNamer_Windows_EXE.exe
            release/ProToolsTrackNamer_Windows_EXE.zip
